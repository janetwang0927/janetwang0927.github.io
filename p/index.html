<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e4dd;
      --border-hover: #d0cac0;
      --text: #2c2825;
      --text-2: #7a7268;
      --text-3: #a39e95;
      --accent: #c47a3a;
      --accent-soft: #f5ebe0;
      --tag-bg: #f0ece6;
      --shadow-sm: 0 1px 2px rgba(44,40,37,0.04);
      --shadow-md: 0 4px 12px rgba(44,40,37,0.06);
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    header { margin-bottom: 2rem; }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    header .subtitle {
      color: var(--text-2);
      font-size: 0.92rem;
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-3);
      font-family: 'JetBrains Mono', monospace;
    }

    .meta .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.4rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .search-wrap input::placeholder { color: var(--text-3); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-wrap .icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      pointer-events: none;
      color: var(--text-3);
    }

    /* List */
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .project-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s ease;
    }

    .project-link:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .project-link .name {
      font-size: 0.92rem;
      font-weight: 600;
    }

    .project-link .arrow {
      color: var(--text-3);
      font-size: 1rem;
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }

    .project-link:hover .arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* States */
    .state-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-2);
      font-size: 0.9rem;
    }

    .state-msg.error { color: #b44; }

    @media (max-width: 500px) {
      .container { padding: 2rem 1rem 3rem; }
      header h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <header>
        <h1>🧰 My Tools</h1>
        <p class="subtitle">Handy apps for myself and family.</p>
        <div class="meta" v-if="data">
          <span class="dot"></span>
          <span>{{ data.total }} tool{{ data.total !== 1 ? 's' : '' }}</span>
          <span>·</span>
          <span>last scanned {{ formatDate(data.generated_at) }}</span>
        </div>
      </header>

      <div v-if="loading" class="state-msg">Loading…</div>

      <div v-else-if="error" class="state-msg error">
        <p>Couldn't load projects.</p>
        <p style="font-size:0.8rem;margin-top:0.4rem">{{ error }}</p>
      </div>

      <template v-else-if="data">
        <div class="search-wrap" v-if="data.total > 5">
          <span class="icon">🔍</span>
          <input v-model="search" type="text" placeholder="Search…">
        </div>

        <div class="project-list">
          <a
            v-for="p in filtered"
            :key="p.path"
            :href="p.path + '/'"
            class="project-link"
          >
            <span class="name">{{ p.name }}</span>
            <span class="arrow">→</span>
          </a>
        </div>

        <div v-if="!filtered.length" class="state-msg">
          No matches.
        </div>
      </template>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const data = ref(null);
        const loading = ref(true);
        const error = ref(null);
        const search = ref('');

        onMounted(async () => {
          try {
            const res = await fetch('projects.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            data.value = await res.json();
          } catch (e) {
            error.value = e.message;
          } finally {
            loading.value = false;
          }
        });

        const filtered = computed(() => {
          if (!data.value) return [];
          const q = search.value.toLowerCase().trim();
          if (!q) return data.value.projects;
          return data.value.projects.filter(p =>
            p.name.toLowerCase().includes(q) ||
            p.path.toLowerCase().includes(q)
          );
        });

        function formatDate(iso) {
          const d = new Date(iso);
          return d.toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            timeZoneName: 'short'
          });
        }

        return { data, loading, error, search, filtered, formatDate };
      }
    }).mount('#app');
  </script>
</body>
</html>
